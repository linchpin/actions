# Build Release Artifact (v4)
#
# Previous (v3): the build fanned out across 5 jobs — Composer Install,
# Theme(s) matrix, Plugin(s) matrix, Skip Release, and a "Create Release and
# Cleanup" job that existed only to download the other jobs' artifacts, move
# folders around and re-upload them as one artifact. Each job billed a
# rounded-up minute plus VM startup, the composer cache condition was inverted
# (`skip_cache == 'true'`) so it never restored, and setup-node was called
# without `cache: npm`.
#
# Next (v4): one job builds everything serially — root Composer install,
# theme npm builds, plugin npm + Composer builds — with working caches, then
# uploads a single deploy-ready `release` artifact. When `release_tag` is set
# the same zip is attached to that GitHub release, so deploys (and rollbacks)
# can download it instead of rebuilding. Wall time is comparable to the v3
# parallel fan-out (the artifact reshuffle job is gone); billable minutes drop
# from ~9 to ~5.

name: Build Release Artifact

on:
  workflow_call:
    inputs:
      themes:
        description: 'JSON array of theme folder names. Defaults to vars.THEMES. Example: ["linchpin"]'
        required: false
        default: ""
        type: string
      plugins:
        description: 'JSON array of plugin folder names. Defaults to vars.PLUGINS. Example: ["linchpin-functionality"]'
        required: false
        default: ""
        type: string
      php_version:
        description: "PHP version. Defaults to vars.PHP_VERSION"
        required: false
        default: ""
        type: string
      node_version:
        description: "Node version. Defaults to vars.NODE_VERSION"
        required: false
        default: ""
        type: string
      build_commands:
        description: "Optional additional shell commands to run after the standard build (multi-line)"
        required: false
        default: ""
        type: string
      release_tag:
        description: "When set, attach release.zip to this existing GitHub release"
        required: false
        default: ""
        type: string
    secrets:
      PACKAGIST_COMPOSER_AUTH_JSON:
        description: "auth.json contents for packagist.linchpin.com (passed via COMPOSER_AUTH, never written to disk)"
        required: false
    outputs:
      artifact:
        description: "Name of the uploaded release artifact"
        value: "release"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No `environment:` binding here, deliberately. Build config (THEMES,
    # PLUGINS, PHP_VERSION, NODE_VERSION, *_USES_COMPOSER,
    # REMOTE_PLUGIN_INSTALL) lives in repo-level vars, and binding an
    # environment subjects the job to its branch protection rules — which
    # rejected create-release builds running from main ("Branch 'main' is
    # not allowed to deploy to Staging").
    # contents: write is only exercised when release_tag is set (asset upload);
    # everything else is read-only.
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # NOTE: no `composer validate` preflight here. The install step below
      # (`composer install --no-dev`) is itself the authoritative check — it
      # fails when a locked version no longer satisfies composer.json. A
      # `composer validate` preflight would be WRONG: release-please bumps the
      # `version` field in composer.json on every release without rebuilding the
      # lock, which `composer validate` rejects (content-hash mismatch) even
      # though `composer install` correctly tolerates it (warns, succeeds). The
      # PR-time gate (validate-composer.yml) uses `composer install` for the
      # same reason.
      - name: Setup PHP and install project Composer dependencies
        if: ${{ vars.REMOTE_PLUGIN_INSTALL == 'false' }}
        uses: linchpin/actions/actions/setup-wp-php@v4
        with:
          php-version: ${{ inputs.php_version || vars.PHP_VERSION }}
          composer-auth: ${{ secrets.PACKAGIST_COMPOSER_AUTH_JSON }}

      - name: Setup Node.js (npm cache)
        if: ${{ hashFiles('themes/*/package-lock.json', 'plugins/*/package-lock.json', 'plugins/*/blocks/package-lock.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || vars.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            themes/*/package-lock.json
            plugins/*/package-lock.json
            plugins/*/blocks/package-lock.json

      - name: Setup Node.js (no lockfiles found)
        if: ${{ hashFiles('themes/*/package-lock.json', 'plugins/*/package-lock.json', 'plugins/*/blocks/package-lock.json') == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || vars.NODE_VERSION }}

      - name: Build themes
        env:
          THEMES_JSON: ${{ inputs.themes || vars.THEMES || '["none"]' }}
          THEME_USES_COMPOSER: ${{ vars.THEME_USES_COMPOSER }}
          COMPOSER_AUTH_INPUT: ${{ secrets.PACKAGIST_COMPOSER_AUTH_JSON }}
        run: |
          set -euo pipefail
          if [ -n "$COMPOSER_AUTH_INPUT" ]; then export COMPOSER_AUTH="$COMPOSER_AUTH_INPUT"; fi
          for theme in $(echo "$THEMES_JSON" | jq -r '.[]'); do
            if [ "$theme" = "none" ]; then
              echo "::notice::No themes configured — skipping theme build"
              continue
            fi
            dir="themes/$theme"
            if [ ! -d "$dir" ]; then
              echo "::error::Theme directory $dir not found"
              exit 1
            fi
            echo "➤ Building theme: $theme"
            if [ "$THEME_USES_COMPOSER" = "true" ] && [ -f "$dir/composer.lock" ]; then
              composer install --no-dev --prefer-dist --no-progress --no-interaction --working-dir="$dir"
            fi
            if [ -f "$dir/package-lock.json" ]; then
              (
                cd "$dir"
                npm ci
                # Lockfiles generated on macOS can omit the linux sass binary
                if grep -q '"sass-embedded"' package.json package-lock.json 2>/dev/null; then
                  npm install --no-save sass-embedded-linux-x64 || true
                fi
                npm run build
                rm -rf node_modules
              )
            fi
          done

      - name: Build plugins
        env:
          PLUGINS_JSON: ${{ inputs.plugins || vars.PLUGINS || '["none"]' }}
          PLUGIN_USES_COMPOSER: ${{ vars.PLUGIN_USES_COMPOSER }}
          COMPOSER_AUTH_INPUT: ${{ secrets.PACKAGIST_COMPOSER_AUTH_JSON }}
        run: |
          set -euo pipefail
          if [ -n "$COMPOSER_AUTH_INPUT" ]; then export COMPOSER_AUTH="$COMPOSER_AUTH_INPUT"; fi
          for plugin in $(echo "$PLUGINS_JSON" | jq -r '.[]'); do
            if [ "$plugin" = "none" ]; then
              echo "::notice::No plugins configured — skipping plugin build"
              continue
            fi
            dir="plugins/$plugin"
            if [ ! -d "$dir" ]; then
              echo "::error::Plugin directory $dir not found"
              exit 1
            fi
            echo "➤ Building plugin: $plugin"
            if [ -f "$dir/package-lock.json" ]; then
              (
                cd "$dir"
                npm ci
                npm run build
                rm -rf node_modules
              )
            fi
            # Composer after npm so the runtime vendor/ ships in the release
            if [ "$PLUGIN_USES_COMPOSER" = "true" ] && [ -f "$dir/composer.lock" ]; then
              composer install --no-dev --prefer-dist --no-progress --no-interaction --working-dir="$dir"
            fi
          done

      - name: Run custom build commands
        if: ${{ inputs.build_commands != '' }}
        run: |
          set -euo pipefail
          ${{ inputs.build_commands }}

      - name: Assemble release directory
        uses: linchpin/actions/actions/build-release@v4
        with:
          remote-plugin-install: ${{ vars.REMOTE_PLUGIN_INSTALL }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: release/
          retention-days: 1
          overwrite: true

      - name: Attach release.zip to GitHub release ${{ inputs.release_tag }}
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd release && zip -rq "$GITHUB_WORKSPACE/release.zip" ./ && cd "$GITHUB_WORKSPACE"
          gh release upload "${{ inputs.release_tag }}" release.zip --clobber --repo "${{ github.repository }}"
          echo "::notice::release.zip attached to ${{ inputs.release_tag }} — deploys can now use it instead of rebuilding"

      # Publish the release ONLY after release.zip is attached. When the caller
      # configures release-please with `draft: true`, the release sits as an
      # unpublished draft until this step, so the `release: published` event —
      # and the production deploy that listens for it — does not fire until the
      # asset exists. That makes the deploy deterministic (no polling for the
      # asset, no billed idle time) and means a failed build leaves a harmless
      # draft instead of a published tag with no asset. Idempotent and harmless
      # for callers that do not use draft releases: `--draft=false` on an
      # already-published release is a no-op.
      - name: Publish release ${{ inputs.release_tag }} now that release.zip is attached
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ inputs.release_tag }}" --draft=false --repo "${{ github.repository }}"
          echo "::notice::Published ${{ inputs.release_tag }} with release.zip attached — the production deploy can now start"
