# Create Release Asset (v4)
#
# Previous (v3): a 4-job pipeline (Composer / Theme matrix / Plugin matrix /
# Build Release Zip) that duplicated build.yml with its own drift — the plugin
# job referenced `matrix.theme` instead of `matrix.plugin`, so plugin npm
# builds silently skipped, themes were installed with `composer update`
# instead of the lock file, and the zip wrapped everything in a `build/`
# folder the Pressable entrypoint could not consume. The attached release.zip
# was therefore never actually deployable, which is why deploys rebuilt from
# scratch.
#
# Next (v4): a thin wrapper around build.yml. The release is built exactly
# once, with the same code path used everywhere else, and a deploy-ready
# release.zip is attached to the GitHub release. deploy.yml consumes that
# asset for production deploys and rollbacks. Release notes/changelog are
# release-please's job, not this workflow's (v3's softprops release step
# duplicated it).

name: Create Release Asset

on:
  workflow_call:
    inputs:
      release_tag:
        description: "The tag of the GitHub release to attach the build to (e.g. release-please outputs.tag_name)"
        required: true
        type: string
      build_commands:
        description: "Optional additional shell commands to run during the build"
        required: false
        default: ""
        type: string
    secrets:
      PACKAGIST_COMPOSER_AUTH_JSON:
        required: false
      GH_BOT_TOKEN:
        description: >-
          PAT forwarded to build.yml so it can PUBLISH the draft release with a
          token that triggers downstream `release: published` workflows
          (GITHUB_TOKEN-created events do not). Optional; build falls back to
          github.token when unset.
        required: false

jobs:
  build:
    name: Build release asset
    uses: ./.github/workflows/build.yml
    # inherit (not an explicit map) so GH_BOT_TOKEN — needed by build.yml's
    # publish step to fire the deploy — flows through alongside the Packagist
    # auth without each secret being threaded by hand.
    secrets: inherit
    with:
      release_tag: ${{ inputs.release_tag }}
      build_commands: ${{ inputs.build_commands }}
