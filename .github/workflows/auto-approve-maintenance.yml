name: Auto Approve Maintenance PRs

on:
  pull_request:
    branches: [main, master, staging, develop]

jobs:
  auto-approve:
    runs-on: ubuntu-latest

    if: startsWith(github.head_ref, 'maintenance/')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47

      - name: Validate changed files
        id: validate
        run: |
          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

          allowed_files_regex="(\.github/workflows/.*\.ya?ml|\.release-please-manifest\.json|CHANGELOG\.md|README\.md|composer\.json|composer\.lock|package\.json|package-lock\.json|yarn\.lock|themes/.*/style\.css)$"

          invalid_files=()
          all_files=()

          for file in ${{ steps.changed-files.outputs.all_changed_files }}
          do
            all_files+=("$file")

            if [[ ! $file =~ $allowed_files_regex ]]; then
              echo "Found non-allowed file: $file"
              invalid_files+=("$file")
            fi
          done

          # Save outputs
          echo "all_files<<EOF" >> $GITHUB_OUTPUT
          printf "%s\n" "${all_files[@]}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "invalid_files<<EOF" >> $GITHUB_OUTPUT
          printf "%s\n" "${invalid_files[@]}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ ${#invalid_files[@]} -eq 0 ]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GH_BOT_TOKEN }}
          script: |
            const allFiles = `${{ steps.validate.outputs.all_files }}`.trim().split('\n').filter(Boolean);
            const invalidFiles = `${{ steps.validate.outputs.invalid_files }}`.trim().split('\n').filter(Boolean);
            const isValid = `${{ steps.validate.outputs.valid }}` === 'true';

            const makeTable = (files) => {
              if (!files.length) return '_None_';
              return [
                '| File |',
                '|------|',
                ...files.map(f => `| \`${f}\` |`)
              ].join('\n');
            };

            let body = '';

            if (isValid) {
              body += `## ✅ Auto-approved: Maintenance PR\n`;
              body += `Only allowed dependency and maintenance files were changed.\n\n`;
            } else {
              body += `## ❌ Not auto-approved: Non-allowed files detected\n`;
              body += `This PR contains files outside the allowed maintenance scope.\n\n`;
            }

            body += `### 📦 Changed Files\n`;
            body += makeTable(allFiles);
            body += `\n\n`;

            if (!isValid) {
              body += `### 🚫 Non-allowed Files\n`;
              body += makeTable(invalidFiles);
              body += `\n\n`;
              body += `> Auto-approval skipped. Please review these changes manually.\n`;
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Auto approve PR
        if: steps.validate.outputs.valid == 'true'
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GH_BOT_TOKEN }}